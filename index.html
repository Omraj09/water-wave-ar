<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>Water Wave - Interactive WebAR Experience</title>
  
  <!-- Modern Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- A-Frame and MindAR Libraries -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    :root {
      --glow-color: #00f2fe;
      --accent-blue: #4facfe;
      --bg-dark: #010811;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      background-color: #000;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Prevent selection and tap highlights */
    * {
      -webkit-tap-highlight-color: transparent;
    }

    /* Premium Glassmorphic Loading Screen */
    #ar-loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #0a182b 0%, var(--bg-dark) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      color: #ffffff;
    }

    #ar-loading-overlay.fade-out {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .loader-card {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 40px 30px;
      width: 80%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), 
                  inset 0 0 30px rgba(0, 242, 254, 0.03);
      position: relative;
      overflow: hidden;
    }

    .loader-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 242, 254, 0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Water Droplet and Wave Ripple Effects */
    .droplet-container {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 35px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .water-droplet-svg {
      width: 55px;
      height: 55px;
      fill: url(#droplet-gradient);
      filter: drop-shadow(0 0 12px rgba(0, 242, 254, 0.7));
      animation: float-and-bounce 4s ease-in-out infinite alternate;
      z-index: 2;
    }

    .wave-ripple {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 1.5px solid rgba(0, 242, 254, 0.35);
      border-radius: 50%;
      animation: expand-ripple 3s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
      z-index: 1;
      pointer-events: none;
    }

    .wave-ripple:nth-child(2) {
      animation-delay: 1s;
    }

    .wave-ripple:nth-child(3) {
      animation-delay: 2s;
    }

    @keyframes float-and-bounce {
      0% {
        transform: translateY(0px) scale(1);
      }
      50% {
        transform: translateY(-8px) scale(0.96, 1.04);
      }
      100% {
        transform: translateY(4px) scale(1.03, 0.97);
      }
    }

    @keyframes expand-ripple {
      0% {
        width: 30px;
        height: 30px;
        opacity: 1;
        box-shadow: inset 0 0 8px rgba(0, 242, 254, 0.2);
      }
      100% {
        width: 140px;
        height: 140px;
        opacity: 0;
        box-shadow: inset 0 0 20px rgba(0, 242, 254, 0);
      }
    }

    .loader-card h1 {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 8px;
      background: linear-gradient(135deg, var(--glow-color) 0%, var(--accent-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .loader-card p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin: 0 auto 30px;
      font-weight: 300;
      letter-spacing: 0.3px;
      line-height: 1.5;
    }

    .progress-bar-container {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar-fill {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, var(--glow-color), var(--accent-blue));
      border-radius: 10px;
      position: absolute;
      left: -100%;
      animation: loading-progress 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes loading-progress {
      0% { left: -40%; width: 30%; }
      50% { left: 30%; width: 50%; }
      100% { left: 100%; width: 20%; }
    }

    /* Elegant Custom Scanning Overlay */
    #ar-scanning-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      z-index: 1000;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #ar-scanning-overlay.hidden {
      opacity: 0;
    }

    .scanning-reticle {
      width: 54vw;
      height: 96vw; /* Exact 9:16 Aspect Ratio matches physical frame */
      max-width: 225px;
      max-height: 400px;
      border: 1px dashed rgba(0, 242, 254, 0.3);
      border-radius: 24px;
      position: relative;
      /* Custom deep overlay focus effect */
      box-shadow: 0 0 0 9999px rgba(1, 8, 17, 0.55); 
      animation: pulse-reticle 2.5s ease-in-out infinite alternate;
    }

    @keyframes pulse-reticle {
      0% {
        border-color: rgba(0, 242, 254, 0.25);
        box-shadow: 0 0 0 9999px rgba(1, 8, 17, 0.55), inset 0 0 15px rgba(0, 242, 254, 0.05);
      }
      100% {
        border-color: rgba(0, 242, 254, 0.7);
        box-shadow: 0 0 0 9999px rgba(1, 8, 17, 0.65), inset 0 0 35px rgba(0, 242, 254, 0.25);
      }
    }

    .scanning-corner {
      position: absolute;
      width: 26px;
      height: 26px;
      border-color: var(--glow-color);
      border-style: solid;
      pointer-events: none;
      filter: drop-shadow(0 0 5px rgba(0, 242, 254, 0.8));
    }

    .top-left {
      top: -2px;
      left: -2px;
      border-width: 4px 0 0 4px;
      border-top-left-radius: 20px;
    }

    .top-right {
      top: -2px;
      right: -2px;
      border-width: 4px 4px 0 0;
      border-top-right-radius: 20px;
    }

    .bottom-left {
      bottom: -2px;
      left: -2px;
      border-width: 0 0 4px 4px;
      border-bottom-left-radius: 20px;
    }

    .bottom-right {
      bottom: -2px;
      right: -2px;
      border-width: 0 4px 4px 0;
      border-bottom-right-radius: 20px;
    }

    .scanning-line {
      position: absolute;
      width: calc(100% - 24px);
      height: 2px;
      left: 12px;
      background: linear-gradient(90deg, transparent 5%, var(--glow-color) 50%, transparent 95%);
      box-shadow: 0 0 10px var(--glow-color);
      border-radius: 50%;
      animation: scan-vertical 3.5s ease-in-out infinite;
    }

    @keyframes scan-vertical {
      0% { top: 6%; }
      50% { top: 94%; }
      100% { top: 6%; }
    }

    .scan-prompt {
      margin-top: 35px;
      font-size: 14px;
      font-weight: 500;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
      letter-spacing: 0.6px;
      background: rgba(1, 8, 17, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 24px;
      border-radius: 30px;
      text-align: center;
      max-width: 250px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    /* Floating Interactive Sound Button */
    #ar-unmute-btn {
      position: fixed;
      bottom: 45px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      background: rgba(1, 8, 17, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 242, 254, 0.25);
      color: #ffffff;
      padding: 13px 25px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.45), 
                  0 0 15px rgba(0, 242, 254, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: auto;
      opacity: 1;
    }

    #ar-unmute-btn.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(25px);
    }

    #ar-unmute-btn:hover {
      background: rgba(0, 242, 254, 0.15);
      border-color: var(--glow-color);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.55), 
                  0 0 25px rgba(0, 242, 254, 0.3);
      transform: translateX(-50%) translateY(-2px);
    }

    #ar-unmute-btn:active {
      transform: translateX(-50%) translateY(1px);
    }

    /* Sophisticated Sound Wave Micro-Animation */
    .sound-waves {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      width: 18px;
      height: 14px;
    }

    .sound-bar {
      width: 2px;
      height: 35%;
      background-color: var(--glow-color);
      border-radius: 2px;
      transition: height 0.2s ease;
    }

    .sound-waves.playing .sound-bar {
      animation: soundwave-jump 0.8s ease-in-out infinite alternate;
    }

    .sound-waves.playing .sound-bar:nth-child(1) { animation-delay: 0.15s; }
    .sound-waves.playing .sound-bar:nth-child(2) { animation-delay: 0.45s; }
    .sound-waves.playing .sound-bar:nth-child(3) { animation-delay: 0.30s; }
    .sound-waves.playing .sound-bar:nth-child(4) { animation-delay: 0.60s; }

    @keyframes soundwave-jump {
      0% { height: 25%; }
      100% { height: 100%; }
    }
  </style>
</head>
<body>

  <!-- Premium Loader Screen -->
  <div id="ar-loading-overlay">
    <div class="loader-card">
      <div class="droplet-container">
        <div class="wave-ripple"></div>
        <div class="wave-ripple"></div>
        <div class="wave-ripple"></div>
        
        <!-- Water Droplet SVG with Color Gradient -->
        <svg class="water-droplet-svg" viewBox="0 0 30 42">
          <defs>
            <linearGradient id="droplet-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f2fe" />
              <stop offset="100%" stop-color="#4facfe" />
            </linearGradient>
          </defs>
          <path d="M15 3
                   C15 3 26 16 26 25
                   A11 11 0 0 1 4 25
                   C4 16 15 3 15 3 Z" />
        </svg>
      </div>

      <h1 id="loading-title">Water Wave AR</h1>
      <p id="loading-status">Initializing advanced spatial engine...</p>

      <div class="progress-bar-container">
        <div class="progress-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- Custom Scan Reticle (Shown after engine loads) -->
  <div id="ar-scanning-overlay" class="hidden">
    <div class="scanning-reticle">
      <div class="scanning-corner top-left"></div>
      <div class="scanning-corner top-right"></div>
      <div class="scanning-corner bottom-left"></div>
      <div class="scanning-corner bottom-right"></div>
      <div class="scanning-line"></div>
    </div>
    <div class="scan-prompt">Scan the physical 9:16 droplet frame to reveal animation</div>
  </div>

  <!-- Floating Audio Unmute/Mute Toggle -->
  <button id="ar-unmute-btn" class="hidden" aria-label="Toggle Sound">
    <span class="sound-waves">
      <span class="sound-bar"></span>
      <span class="sound-bar"></span>
      <span class="sound-bar"></span>
      <span class="sound-bar"></span>
    </span>
    <span id="btn-text">Tap for Audio</span>
  </button>

  <!-- WebAR Scene using Free, Open Source MindAR and A-Frame -->
  <a-scene 
    mindar-image="imageTargetSrc: ./Water%20wave.mind; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <!-- Premium mobile playback attributes: muted, playsinline, loop -->
      <video id="animation-mp4" 
             src="./animation.mp4" 
             preload="auto" 
             loop="true" 
             autoplay="true" 
             muted="true" 
             playsinline="true" 
             webkit-playsinline="true" 
             crossorigin="anonymous">
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Overlay Target logic using exact vertical 9:16 aspect ratio -->
    <a-entity mindar-image-target="targetIndex: 0" ar-target-listener>
      <a-video src="#animation-mp4" 
               width="1.0" 
               height="1.77778" 
               position="0 0 0" 
               rotation="0 0 0">
      </a-video>
    </a-entity>
  </a-scene>

  <script>
    // A-Frame target listener component to sync video playback
    AFRAME.registerComponent('ar-target-listener', {
      init: function () {
        const video = document.querySelector('#animation-mp4');
        const scanningOverlay = document.querySelector('#ar-scanning-overlay');
        const unmuteBtn = document.querySelector('#ar-unmute-btn');

        // Play the video stream immediately when target is detected
        this.el.addEventListener('targetFound', () => {
          console.log('AR Target Found: Running animation.');
          scanningOverlay.classList.add('hidden');
          unmuteBtn.classList.remove('hidden');
          
          // Smoothly play video (handles cases where browser unblocked playback)
          video.play().catch(err => {
            console.log('Video autoplay blocked by browser policy:', err);
          });
        });

        // Pause video immediately if user moves away from target to save resource/battery
        this.el.addEventListener('targetLost', () => {
          console.log('AR Target Lost: Pausing animation.');
          scanningOverlay.classList.remove('hidden');
          unmuteBtn.classList.add('hidden');
          video.pause();
        });
      }
    });

    // Main overlay and user interaction logic
    document.addEventListener('DOMContentLoaded', () => {
      const scene = document.querySelector('a-scene');
      const loadingOverlay = document.querySelector('#ar-loading-overlay');
      const scanningOverlay = document.querySelector('#ar-scanning-overlay');
      const unmuteBtn = document.querySelector('#ar-unmute-btn');
      const video = document.querySelector('#animation-mp4');
      const soundWaves = document.querySelector('.sound-waves');
      const btnText = document.querySelector('#btn-text');

      // Dismiss loading overlay when spatial computer is calibrated
      scene.addEventListener('arReady', () => {
        console.log('MindAR engine initialized.');
        loadingOverlay.classList.add('fade-out');
        
        // Let transition finish before showing target scanning reticle
        setTimeout(() => {
          loadingOverlay.style.display = 'none';
          scanningOverlay.classList.remove('hidden');
        }, 800);
      });

      // Catch camera permission rejections or browser configuration errors
      scene.addEventListener('arError', (event) => {
        console.error('AR engine initialization failed:', event);
        const statusText = document.querySelector('#loading-status');
        const titleText = document.querySelector('#loading-title');
        
        if (statusText) {
          titleText.innerText = "Access Blocked";
          statusText.innerHTML = `<span style="color: #ff4a4a; font-weight: 500;">Camera access was blocked or WebGL is unsupported. Please make sure this page is running over HTTPS and permit camera access.</span>`;
        }
      });

      // Sound button controller (unmute helper)
      unmuteBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // Avoid triggering any underlying double taps
        
        if (video.muted) {
          video.muted = false;
          // Force active state refresh on iOS/Safari
          video.play().then(() => {
            btnText.innerText = "Mute Sound";
            soundWaves.classList.add('playing');
            unmuteBtn.style.borderColor = 'var(--glow-color)';
          }).catch(err => {
            console.error('Error on unmute play:', err);
          });
        } else {
          video.muted = true;
          btnText.innerText = "Tap for Audio";
          soundWaves.classList.remove('playing');
          unmuteBtn.style.borderColor = 'rgba(0, 242, 254, 0.25)';
        }
      });
    });
  </script>
</body>
</html>
